<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SOFT30121 Flashcards — System Analysis Revision</title>
<style>
  :root {
    --bg: #0f172a;
    --bg-2: #1e293b;
    --panel: #ffffff;
    --panel-dark: #1e293b;
    --ink: #0f172a;
    --ink-soft: #475569;
    --accent: #f59e0b;
    --accent-2: #fbbf24;
    --primary: #1e3a8a;
    --primary-2: #3b82f6;
    --good: #10b981;
    --bad: #ef4444;
    --border: #e2e8f0;
    --shadow: 0 10px 40px rgba(15, 23, 42, 0.18);
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
    color: var(--ink);
    min-height: 100vh;
    padding: 24px 16px 48px;
  }

  .wrap {
    max-width: 980px;
    margin: 0 auto;
  }

  /* Header */
  header {
    color: #f8fafc;
    text-align: center;
    margin-bottom: 24px;
  }
  header h1 {
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    margin: 0 0 6px;
    letter-spacing: -0.01em;
  }
  header .sub {
    color: #cbd5e1;
    font-size: 0.95rem;
    margin: 0;
  }

  /* Mode tabs */
  .tabs {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin: 18px 0 14px;
  }
  .tab {
    background: rgba(255,255,255,0.08);
    color: #e2e8f0;
    border: 1px solid rgba(255,255,255,0.15);
    padding: 10px 22px;
    border-radius: 999px;
    cursor: pointer;
    font-weight: 600;
    font-size: 0.95rem;
    transition: all 0.18s ease;
  }
  .tab:hover { background: rgba(255,255,255,0.15); }
  .tab.active {
    background: var(--accent);
    color: var(--ink);
    border-color: var(--accent);
    box-shadow: 0 4px 14px rgba(245, 158, 11, 0.4);
  }

  /* Controls panel */
  .controls {
    background: var(--panel);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 18px;
    box-shadow: var(--shadow);
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 10px;
  }
  .controls label {
    font-size: 0.85rem;
    color: var(--ink-soft);
    font-weight: 600;
    margin-right: 4px;
  }
  select, button {
    font-family: inherit;
    font-size: 0.92rem;
  }
  select {
    border: 1px solid var(--border);
    background: #f8fafc;
    border-radius: 8px;
    padding: 8px 10px;
    color: var(--ink);
    cursor: pointer;
    min-width: 0;
  }
  .btn {
    border: 1px solid var(--border);
    background: #f8fafc;
    color: var(--ink);
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.15s ease;
  }
  .btn:hover { background: #e2e8f0; }
  .btn.primary {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
  }
  .btn.primary:hover { background: var(--primary-2); border-color: var(--primary-2); }
  .btn.accent {
    background: var(--accent);
    color: var(--ink);
    border-color: var(--accent);
  }
  .btn.accent:hover { background: var(--accent-2); border-color: var(--accent-2); }
  .spacer { flex: 1; }
  .status {
    font-size: 0.88rem;
    color: var(--ink-soft);
    font-weight: 600;
  }

  /* Stage shared */
  .stage {
    background: var(--panel);
    border-radius: 18px;
    padding: 24px;
    box-shadow: var(--shadow);
    min-height: 420px;
    display: flex;
    flex-direction: column;
  }

  /* Card flip */
  .card-wrap {
    perspective: 1400px;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .card {
    position: relative;
    width: 100%;
    min-height: 320px;
    cursor: pointer;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.2, 0.7, 0.2, 1.0);
    border-radius: 16px;
  }
  .card.flipped { transform: rotateY(180deg); }
  .face {
    position: absolute;
    inset: 0;
    border-radius: 16px;
    padding: 32px 28px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    text-align: center;
    border: 1px solid var(--border);
  }
  .face.front {
    background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
    color: white;
  }
  .face.back {
    background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
    color: var(--ink);
    transform: rotateY(180deg);
  }
  .face .tag {
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    opacity: 0.85;
    margin-bottom: 14px;
  }
  .face .q, .face .a {
    font-size: clamp(1.05rem, 2vw, 1.4rem);
    line-height: 1.5;
    font-weight: 500;
  }
  .face .a { font-weight: 500; }
  .face .hint {
    font-size: 0.78rem;
    opacity: 0.7;
    margin-top: 18px;
    font-style: italic;
  }

  /* Nav row */
  .nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 18px;
    gap: 10px;
  }
  .nav .progress {
    flex: 1;
    height: 8px;
    background: #e2e8f0;
    border-radius: 999px;
    overflow: hidden;
    margin: 0 14px;
  }
  .nav .progress .bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    border-radius: 999px;
    transition: width 0.3s ease;
  }
  .nav .count {
    color: var(--ink-soft);
    font-weight: 700;
    font-size: 0.9rem;
    min-width: 80px;
    text-align: center;
  }

  /* Quiz */
  .quiz-q {
    background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
    color: white;
    border-radius: 14px;
    padding: 22px 24px;
    margin-bottom: 16px;
  }
  .quiz-q .tag {
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    opacity: 0.85;
    margin-bottom: 10px;
  }
  .quiz-q .q {
    font-size: clamp(1.05rem, 2vw, 1.25rem);
    line-height: 1.5;
    margin: 0;
  }
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .option {
    background: #f8fafc;
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    text-align: left;
    cursor: pointer;
    font-size: 0.98rem;
    line-height: 1.45;
    color: var(--ink);
    transition: all 0.15s ease;
    width: 100%;
    font-family: inherit;
  }
  .option:hover:not(.disabled) {
    border-color: var(--primary-2);
    background: #eff6ff;
  }
  .option.correct {
    background: #d1fae5;
    border-color: var(--good);
    color: #065f46;
    font-weight: 600;
  }
  .option.wrong {
    background: #fee2e2;
    border-color: var(--bad);
    color: #991b1b;
  }
  .option.disabled { cursor: default; }

  .feedback {
    margin-top: 14px;
    padding: 14px 16px;
    border-radius: 10px;
    font-size: 0.95rem;
  }
  .feedback.good {
    background: #ecfdf5;
    color: #065f46;
    border: 1px solid #6ee7b7;
  }
  .feedback.bad {
    background: #fef2f2;
    color: #991b1b;
    border: 1px solid #fca5a5;
  }

  .score-bar {
    display: flex;
    gap: 14px;
    align-items: center;
    margin-bottom: 16px;
    padding: 12px 16px;
    background: #f1f5f9;
    border-radius: 12px;
    font-size: 0.92rem;
    color: var(--ink);
    flex-wrap: wrap;
  }
  .score-pill {
    background: white;
    padding: 6px 12px;
    border-radius: 999px;
    font-weight: 700;
    border: 1px solid var(--border);
  }
  .score-pill.good { color: var(--good); }
  .score-pill.bad { color: var(--bad); }

  .results {
    text-align: center;
    padding: 24px;
  }
  .results h2 {
    font-size: 1.8rem;
    margin: 0 0 8px;
  }
  .results .big {
    font-size: 3rem;
    font-weight: 800;
    margin: 12px 0;
    color: var(--primary);
  }

  footer {
    color: #94a3b8;
    font-size: 0.78rem;
    text-align: center;
    margin-top: 22px;
  }
  kbd {
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    padding: 1px 6px;
    border-radius: 4px;
    font-family: ui-monospace, SFMono-Regular, monospace;
    font-size: 0.8em;
  }

  @media (max-width: 560px) {
    .controls { padding: 12px; }
    .controls label { display: none; }
    .stage { padding: 16px; min-height: 360px; }
    .face { padding: 24px 18px; }
    .card { min-height: 280px; }
    .nav .progress { margin: 0 8px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>SOFT30121 — System Analysis Flashcards</h1>
    <p class="sub">Revision deck covering all 12 lectures. Click cards to flip. Switch to Quiz for multiple-choice practice.</p>
  </header>

  <div class="tabs">
    <button class="tab active" data-mode="flip">Flip Cards</button>
    <button class="tab" data-mode="quiz">Quiz Mode</button>
  </div>

  <div class="controls">
    <label for="lectureFilter">Lecture:</label>
    <select id="lectureFilter">
      <option value="all">All lectures</option>
    </select>
    <button class="btn" id="shuffleBtn">Shuffle</button>
    <button class="btn" id="resetBtn">Reset</button>
    <div class="spacer"></div>
    <div class="status" id="statusText"></div>
  </div>

  <div class="stage" id="stage"></div>

  <footer>
    <kbd>Space</kbd> flip · <kbd>←</kbd> <kbd>→</kbd> navigate · <kbd>1-4</kbd> quiz answers
  </footer>
</div>

<script>
/* ============================================================
   FLASHCARD DATA
   Format: { lecture: number, topic: string, q: string, a: string }
   Sourced from Revision Notes and lecture slides (all 12 lectures).
============================================================ */
const LECTURE_TITLES = {
  1: "Intro & Information Systems Development",
  2: "Planning & Project Management",
  3: "Requirements Determination",
  4: "Teams, Use Cases & Process Modelling",
  5: "Data Modelling & Architecture",
  6: "UI Design & Program Design",
  7: "Data Storage & Source Control",
  8: "Implementation & System Transition",
  9: "Sprinting",
  10: "Testing",
  11: "AI in Software Development",
  12: "How to Demo"
};

const CARDS = [
  // ---------- Lecture 1 ----------
  { lecture: 1, topic: "SDLC", q: "What are the 4 main phases of the SDLC covered in SOFT30121?", a: "Planning → Analysis → Design → Implementation (alongside Project Management throughout)." },
  { lecture: 1, topic: "Assessment", q: "How is SOFT30121 assessed?", a: "70% coursework (group SRS + system + code) and 30% exam covering ALL lecture slides. Demo week is mandatory — no demo = no mark." },
  { lecture: 1, topic: "Waterfall", q: "Describe the Waterfall methodology and when it's appropriate.", a: "Linear and sequential. Heavy upfront planning. Changes are costly. Best for stable, well-defined, complex/reliable requirements." },
  { lecture: 1, topic: "V-Model", q: "What is the V-Model?", a: "A Waterfall variant where each design stage is linked to a corresponding test stage (parallel test design)." },
  { lecture: 1, topic: "Parallel", q: "What is the Parallel development methodology?", a: "The system is split into subprojects developed simultaneously, then integrated together at the end." },
  { lecture: 1, topic: "RAD", q: "What does RAD stand for and what is its key feature?", a: "Rapid Application Development — iterative approach using quick prototypes given to users for feedback." },
  { lecture: 1, topic: "Agile/Scrum", q: "Describe Agile/Scrum methodology.", a: "Incremental and adaptive. Continuous planning, short sprints (1–4 weeks), embraces change. Best when requirements are unclear or schedule is short." },
  { lecture: 1, topic: "User Stories", q: "What is the standard user story format?", a: "\"As a [who], I want to [what], so that [why].\"" },
  { lecture: 1, topic: "Agile Values", q: "Name two key Agile values.", a: "Working software OVER comprehensive documentation; Customer collaboration OVER contract negotiation." },
  { lecture: 1, topic: "Agile Roles", q: "What are the three core Agile/Scrum roles?", a: "Product Manager (Product Owner), Scrum Master, and Development Team." },
  { lecture: 1, topic: "Prototyping", q: "What is the difference between system prototyping and throwaway prototyping?", a: "System prototyping: build a working prototype that evolves into the final system. Throwaway prototyping: build prototypes purely to explore design ideas, then discard them." },
  { lecture: 1, topic: "XP", q: "What is Extreme Programming (XP)?", a: "An Agile variant that emphasises test-driven development, pair programming, refactoring, and continuous integration." },

  // ---------- Lecture 2 ----------
  { lecture: 2, topic: "Why Plan", q: "Why does planning matter in software development?", a: "Poor planning leads to project failure, budget overruns, and missed requirements. 62% of IT projects miss deadlines, 49% go over budget, 41% fail to deliver business value." },
  { lecture: 2, topic: "Failures", q: "Name a famous IT project failure and its cause.", a: "UK NHS IT: £6bn became £10bn (poor requirements/stakeholder management). FBI Virtual Case File: $170m wasted (old infrastructure). Denver Airport Baggage: $560m over budget (underestimated complexity)." },
  { lecture: 2, topic: "Feasibility", q: "What are the three types of feasibility study?", a: "Technical (can we build it?), Economic (should we — ROI, costs, intangible benefits?), and Organisational (will they use it?)." },
  { lecture: 2, topic: "Effort", q: "What is the typical SDLC effort distribution?", a: "Planning 15%, Analysis 20%, Design 35%, Implementation 30%." },
  { lecture: 2, topic: "SWOT", q: "What is a SWOT analysis used for in planning?", a: "To identify Strengths, Weaknesses, Opportunities, and Threats — used to identify opportunities during planning." },
  { lecture: 2, topic: "Scope Creep", q: "What is scope creep and how is it avoided?", a: "New requirements added after scope was defined. Avoided through clear requirements documentation and strong project-management decisions." },
  { lecture: 2, topic: "Timeboxing", q: "What is timeboxing?", a: "A fixed deadline for a task — if you can't finish, reduce functionality rather than extend the deadline. A Sprint is a timebox in Scrum." },
  { lecture: 2, topic: "WBS", q: "What does WBS stand for?", a: "Work Breakdown Structure — breaks the project into smaller, manageable tasks." },
  { lecture: 2, topic: "Gantt Chart", q: "What does a Gantt chart show?", a: "A visual timeline showing tasks, their durations, dependencies, and the critical path." },
  { lecture: 2, topic: "RACI", q: "What does RACI stand for?", a: "Responsible, Accountable, Consulted, Informed — a matrix that defines who does what on a project." },
  { lecture: 2, topic: "PM Tools", q: "Compare Trello and Jira.", a: "Trello: Kanban boards, lightweight, beginner-friendly. Jira: full Agile PM (Scrum/Kanban), sprint planning, burndown charts — market leader for Agile teams." },

  // ---------- Lecture 3 ----------
  { lecture: 3, topic: "Requirement", q: "What is a requirement?", a: "A statement of what the system must do or what characteristics it needs to have." },
  { lecture: 3, topic: "Functional vs Non", q: "What is the difference between functional and non-functional requirements?", a: "Functional = what the system must DO (e.g. 'allow customers to view 3 years of order history'). Non-functional = characteristics it must HAVE (e.g. 'accessible from mobile devices')." },
  { lecture: 3, topic: "Process", q: "What are the 4 steps of the requirements process?", a: "1) Discovery (elicitation), 2) Classification (functional/non-functional), 3) Prioritisation (MoSCoW), 4) Documentation (numbered, with user stories)." },
  { lecture: 3, topic: "MoSCoW", q: "What does MoSCoW prioritisation stand for?", a: "Must Have, Should Have, Could Have, Won't Have." },
  { lecture: 3, topic: "Interviews", q: "What's the elicitation technique 'Interviews' and a tip for it?", a: "Structured conversation with stakeholders using open and closed questions. Listen actively and repeat back answers to confirm." },
  { lecture: 3, topic: "Document Analysis", q: "When is document analysis useful for elicitation?", a: "When reviewing existing documents to understand the current system — best when the system is well-documented." },
  { lecture: 3, topic: "Observation", q: "What is the risk of using observation to elicit requirements?", a: "Your presence changes behaviour — people act differently when watched, so you may not see the 'real' system." },
  { lecture: 3, topic: "Questionnaires", q: "What's the trade-off with questionnaires?", a: "Good for large groups but suffer from low response rates. Questions must be reviewed carefully before sending." },
  { lecture: 3, topic: "JAD", q: "What does JAD stand for?", a: "Joint Application Development — project team, users, and management collaborate together in one room." },
  { lecture: 3, topic: "Good Reqs", q: "Name 3 criteria for a good requirement.", a: "Correct (addresses real user needs), Unambiguous (only one interpretation), Complete, Consistent (no contradictions), Ranked for importance, and does NOT specify a design solution." },
  { lecture: 3, topic: "User Story", q: "What three things does a user story include?", a: "Story ID/Name, Description (As a... I want... so that...), and Confirmation (acceptance criteria — both functional and non-functional)." },

  // ---------- Lecture 4 ----------
  { lecture: 4, topic: "Teamwork", q: "What % of real software work happens in teams?", a: "Almost 80%." },
  { lecture: 4, topic: "Pro Skills", q: "Name 4 key professional skills for software teamwork.", a: "Communication (clear updates), Accountability (meet commitments), Empathy (understand teammates), and Adaptability (handle change without panic)." },
  { lecture: 4, topic: "SBI", q: "What is the SBI feedback model?", a: "Situation → Behaviour → Impact. Focus on the work, not the person. Be specific, suggest solutions, and be timely." },
  { lecture: 4, topic: "Use Case", q: "What is a use case?", a: "A description of an interaction between an actor (user) and the system to achieve a goal." },
  { lecture: 4, topic: "Actor", q: "What is an 'actor' in a use case?", a: "A person or system that interacts with the system being designed." },
  { lecture: 4, topic: "Use Case Diagram", q: "What does a use case diagram show?", a: "A UML diagram showing all possible actor–system interactions — a visual overview of who can do what." },
  { lecture: 4, topic: "Misuse Case", q: "What is a misuse case?", a: "Documents potential harmful or accidental interactions — used to identify security requirements." },
  { lecture: 4, topic: "Process Model", q: "What is a process model?", a: "A graphical representation of how a business process works — its tasks, decisions, and data flows." },
  { lecture: 4, topic: "Activity Diagram", q: "What is an Activity Diagram?", a: "UML notation showing control flow from start to finish. Linked closely to code with strict syntax rules." },
  { lecture: 4, topic: "BPMN", q: "What does BPMN stand for?", a: "Business Process Modelling Notation — shows end-to-end flow including different participants." },
  { lecture: 4, topic: "DFD", q: "What is a DFD and what is it used for?", a: "Data Flow Diagram — maps how information flows through a process using rectangles, circles, and arrows." },

  // ---------- Lecture 5 ----------
  { lecture: 5, topic: "Data Model", q: "What is the difference between a logical and physical data model?", a: "Logical: focuses on WHAT data is stored and how entities relate — no implementation details. Physical: reflects HOW data is stored — linked to specific DB technology." },
  { lecture: 5, topic: "ERD", q: "What does an ERD show and how?", a: "Entity Relationship Diagram — entities shown as boxes, relationships as lines, with cardinality symbols (one-to-many, many-to-many). ERDs do NOT imply sequence." },
  { lecture: 5, topic: "Architecture Functions", q: "What are the 4 basic architectural functions of all software systems?", a: "Presentation Logic (UI), Application Logic (business rules), Data Access Logic (SQL queries), and Data Storage (DB/file system)." },
  { lecture: 5, topic: "Server-Based", q: "What is a server-based architecture?", a: "The server performs all four functions. Clients are 'dumb terminals'. Now seen in VDI (virtual desktops)." },
  { lecture: 5, topic: "Client-Server", q: "How does a 2-tier client-server architecture split work?", a: "Client handles presentation + application logic. Server handles data access + storage." },
  { lecture: 5, topic: "3-Tier", q: "What is a 3-tier architecture?", a: "Presentation | Application Logic | Data — each on separate servers. Scalable because tiers can be scaled independently." },
  { lecture: 5, topic: "MVC", q: "What does MVC stand for?", a: "Model–View–Controller. A widely used architectural pattern combining three design patterns (Observer, Composite, Strategy)." },
  { lecture: 5, topic: "Model", q: "In MVC, what does the Model do?", a: "Stores and manages data. Notifies views of changes using the Observer pattern." },
  { lecture: 5, topic: "View", q: "In MVC, what does the View do?", a: "Displays data to the user. A composite of GUI components (Composite pattern). Sends user actions to the Controller." },
  { lecture: 5, topic: "Controller", q: "In MVC, what does the Controller do?", a: "Handles user input and decides what happens next (Strategy pattern). Behaviour can change without modifying the View." },
  { lecture: 5, topic: "MVC Frameworks", q: "Name three MVC frameworks.", a: "Ruby on Rails, Django, Spring MVC, Flask." },

  // ---------- Lecture 6 ----------
  { lecture: 6, topic: "UI Mechanisms", q: "What are the three UI mechanisms?", a: "Navigation (how user gives instructions — buttons/menus), Input (how the system captures info — forms/fields), and Output (how the system provides info — reports/screens)." },
  { lecture: 6, topic: "UI Principles", q: "Name 3 UI design principles.", a: "Use space effectively (avoid clutter); be simple and pleasant; be consistent across screens; provide accessibility; give feedback for user actions; test usability early and often." },
  { lecture: 6, topic: "Touchscreens", q: "Give two considerations for designing touchscreen UIs.", a: "Typed data entry is awkward; finger can obscure content; no hover/tooltip; accidental touches when picking up the device." },
  { lecture: 6, topic: "Cohesion", q: "What is high cohesion?", a: "Each module does ONE thing well. Unrelated functions belong in separate modules." },
  { lecture: 6, topic: "Coupling", q: "What is loose coupling?", a: "Modules have minimal dependencies on each other — changes in one have minimal impact on others." },
  { lecture: 6, topic: "Fan-In", q: "What does high fan-in mean?", a: "A module is reused in many places — promotes code reuse." },
  { lecture: 6, topic: "Fan-Out", q: "What does low fan-out mean and why is it desirable?", a: "A module depends on few other modules. High fan-out makes code hard to follow." },
  { lecture: 6, topic: "ISO 9126", q: "Name the 6 ISO 9126 software quality characteristics.", a: "Functionality, Reliability, Usability, Efficiency, Maintainability, Portability." },
  { lecture: 6, topic: "ISO Functionality", q: "What sub-characteristics fall under Functionality (ISO 9126)?", a: "Suitability, Accuracy, Interoperability, Security, Compliance." },
  { lecture: 6, topic: "ISO Reliability", q: "What sub-characteristics fall under Reliability?", a: "Maturity, Fault tolerance, Recoverability." },
  { lecture: 6, topic: "ISO Usability", q: "What sub-characteristics fall under Usability?", a: "Understandability, Learnability, Operability, Attractiveness." },
  { lecture: 6, topic: "ISO 25010", q: "What are the main differences between ISO 9126 and ISO 25010?", a: "ISO 25010 adds Compatibility and Security as top-level characteristics, splits Functionality into Functional Suitability, and renames Efficiency to Performance Efficiency." },

  // ---------- Lecture 7 ----------
  { lecture: 7, topic: "Data Forms", q: "Name the three forms of data with examples.", a: "Structured (tables/rows, fixed schema — RDBMS, spreadsheets), Semi-Structured (flexible — JSON, XML, NoSQL, emails), Unstructured (no schema — images, videos, PDFs)." },
  { lecture: 7, topic: "Master File", q: "What is a master file?", a: "Core, permanent business data (e.g. customer records). Kept long-term." },
  { lecture: 7, topic: "Transaction File", q: "What is a transaction file?", a: "Day-to-day events that update master files. Can be destroyed after processing." },
  { lecture: 7, topic: "Lookup File", q: "What is a look-up/reference file?", a: "Static validation data (e.g. country codes, valid states). Read-only." },

/* ============================================================
   STATE
============================================================ */
const STORAGE_KEY = "soft30121-flashcards-v1";

const state = {
  mode: "flip",
  lectureFilter: "all",
  cards: [],
  index: 0,
  flipped: false,
  // quiz
  quizCards: [],
  quizIndex: 0,
  quizAnswered: false,
  quizCorrect: 0,
  quizWrong: 0
};

/* ============================================================
   HELPERS
============================================================ */
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function filteredCards() {
  if (state.lectureFilter === "all") return CARDS.slice();
  const n = parseInt(state.lectureFilter, 10);
  return CARDS.filter(c => c.lecture === n);
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      mode: state.mode,
      lectureFilter: state.lectureFilter
    }));
  } catch (e) {}
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const obj = JSON.parse(raw);
    if (obj.mode) state.mode = obj.mode;
    if (obj.lectureFilter) state.lectureFilter = obj.lectureFilter;
  } catch (e) {}
}

/* ============================================================
   LECTURE DROPDOWN
============================================================ */
function buildLectureDropdown() {
  const sel = document.getElementById("lectureFilter");
  for (let i = 1; i <= 12; i++) {
    const opt = document.createElement("option");
    opt.value = String(i);
    opt.textContent = `Lecture ${i} — ${LECTURE_TITLES[i]}`;
    sel.appendChild(opt);
  }
  sel.value = state.lectureFilter;
  sel.addEventListener("change", () => {
    state.lectureFilter = sel.value;
    saveState();
    initDeck();
    render();
  });
}

/* ============================================================
   TABS
============================================================ */
function bindTabs() {
  document.querySelectorAll(".tab").forEach(btn => {
    btn.addEventListener("click", () => {
      state.mode = btn.dataset.mode;
      document.querySelectorAll(".tab").forEach(b => b.classList.toggle("active", b === btn));
      saveState();
      initDeck();
      render();
    });
  });
  // Set initial active
  document.querySelectorAll(".tab").forEach(b => b.classList.toggle("active", b.dataset.mode === state.mode));
}

/* ============================================================
   DECK INIT
============================================================ */
function initDeck() {
  state.cards = filteredCards();
  state.index = 0;
  state.flipped = false;

  // Quiz: shuffle and limit if needed
  state.quizCards = shuffle(filteredCards());
  state.quizIndex = 0;
  state.quizAnswered = false;
  state.quizCorrect = 0;
  state.quizWrong = 0;
}

/* ============================================================
   FLIP MODE RENDER
============================================================ */
function renderFlip() {
  const stage = document.getElementById("stage");
  if (state.cards.length === 0) {
    stage.innerHTML = `<div class="results"><h2>No cards in this filter.</h2></div>`;
    return;
  }
  const c = state.cards[state.index];
  const progress = ((state.index + 1) / state.cards.length) * 100;

  stage.innerHTML = `
    <div class="card-wrap">
      <div class="card ${state.flipped ? "flipped" : ""}" id="card">
        <div class="face front">
          <div class="tag">Lecture ${c.lecture} · ${c.topic}</div>
          <div class="q">${escapeHtml(c.q)}</div>
          <div class="hint">Click card or press Space to reveal</div>
        </div>
        <div class="face back">
          <div class="tag">Answer</div>
          <div class="a">${escapeHtml(c.a)}</div>
          <div class="hint">Click to flip back · → for next</div>
        </div>
      </div>
    </div>
    <div class="nav">
      <button class="btn" id="prevBtn">← Prev</button>
      <div class="progress"><div class="bar" style="width:${progress}%"></div></div>
      <div class="count">${state.index + 1} / ${state.cards.length}</div>
      <button class="btn primary" id="nextBtn">Next →</button>
    </div>
  `;

  document.getElementById("card").addEventListener("click", () => {
    state.flipped = !state.flipped;
    document.getElementById("card").classList.toggle("flipped", state.flipped);
  });
  document.getElementById("prevBtn").addEventListener("click", prev);
  document.getElementById("nextBtn").addEventListener("click", next);
  updateStatus();
}

function next() {
  if (state.index < state.cards.length - 1) {
    state.index++;
    state.flipped = false;
    renderFlip();
  }
}
function prev() {
  if (state.index > 0) {
    state.index--;
    state.flipped = false;
    renderFlip();
  }
}

/* ============================================================
   QUIZ MODE
============================================================ */
function buildOptionsForQuiz(currentCard) {
  // Pick 3 wrong answers from other cards in the same lecture (preferred),
  // falling back to the full set if not enough.
  const pool = CARDS.filter(c => c !== currentCard);
  const sameLecture = pool.filter(c => c.lecture === currentCard.lecture);
  let candidates = sameLecture.length >= 3 ? sameLecture : pool;
  candidates = shuffle(candidates).slice(0, 3);
  const opts = shuffle([currentCard, ...candidates]);
  return opts;
}

function renderQuiz() {
  const stage = document.getElementById("stage");
  if (state.quizCards.length === 0) {
    stage.innerHTML = `<div class="results"><h2>No cards in this filter.</h2></div>`;
    return;
  }

  // Finished?
  if (state.quizIndex >= state.quizCards.length) {
    const total = state.quizCorrect + state.quizWrong;
    const pct = total === 0 ? 0 : Math.round((state.quizCorrect / total) * 100);
    stage.innerHTML = `
      <div class="results">
        <h2>Quiz complete!</h2>
        <div class="big">${pct}%</div>
        <p>You got <strong>${state.quizCorrect}</strong> right and <strong>${state.quizWrong}</strong> wrong out of ${total}.</p>
        <p style="margin-top:18px;">
          <button class="btn accent" id="restartQuiz">Try again</button>
        </p>
      </div>
    `;
    document.getElementById("restartQuiz").addEventListener("click", () => {
      initDeck();
      render();
    });
    updateStatus();
    return;
  }

  const c = state.quizCards[state.quizIndex];
  const options = state._currentOptions || buildOptionsForQuiz(c);
  state._currentOptions = options;
  const progress = ((state.quizIndex) / state.quizCards.length) * 100;

  stage.innerHTML = `
    <div class="score-bar">
      <div>Question <strong>${state.quizIndex + 1}</strong> of ${state.quizCards.length}</div>
      <div class="score-pill good">✓ ${state.quizCorrect}</div>
      <div class="score-pill bad">✗ ${state.quizWrong}</div>
    </div>
    <div class="quiz-q">
      <div class="tag">Lecture ${c.lecture} · ${c.topic}</div>
      <p class="q">${escapeHtml(c.q)}</p>
    </div>
    <div class="options" id="options"></div>
    <div id="feedback"></div>
    <div class="nav">
      <div class="progress"><div class="bar" style="width:${progress}%"></div></div>
      <button class="btn primary" id="quizNext" style="display:none;">Next →</button>
    </div>
  `;

  const optsEl = document.getElementById("options");
  options.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.className = "option";
    btn.textContent = `${i + 1}. ${opt.a}`;
    btn.dataset.correct = opt === c ? "1" : "0";
    btn.addEventListener("click", () => answerQuiz(btn, opt === c, c));
    optsEl.appendChild(btn);
  });

  document.getElementById("quizNext").addEventListener("click", nextQuiz);
  updateStatus();
}

function answerQuiz(btn, isCorrect, card) {
  if (state.quizAnswered) return;
  state.quizAnswered = true;

  document.querySelectorAll(".option").forEach(o => {
    o.classList.add("disabled");
    if (o.dataset.correct === "1") o.classList.add("correct");
  });
  if (!isCorrect) btn.classList.add("wrong");

  if (isCorrect) state.quizCorrect++;
  else state.quizWrong++;

  const fb = document.getElementById("feedback");
  if (isCorrect) {
    fb.innerHTML = `<div class="feedback good">Correct! 🎯</div>`;
  } else {
    fb.innerHTML = `<div class="feedback bad"><strong>Answer:</strong> ${escapeHtml(card.a)}</div>`;
  }
  document.getElementById("quizNext").style.display = "inline-block";
}

function nextQuiz() {
  state.quizIndex++;
  state.quizAnswered = false;
  state._currentOptions = null;
  renderQuiz();
}

/* ============================================================
   COMMON
============================================================ */
function render() {
  if (state.mode === "flip") renderFlip();
  else renderQuiz();
}

function updateStatus() {
  const s = document.getElementById("statusText");
  const total = filteredCards().length;
  if (state.mode === "flip") {
    s.textContent = `${total} card${total === 1 ? "" : "s"} loaded`;
  } else {
    s.textContent = `${state.quizCorrect + state.quizWrong}/${state.quizCards.length} answered`;
  }
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

/* ============================================================
   BUTTONS
============================================================ */
document.getElementById("shuffleBtn").addEventListener("click", () => {
  if (state.mode === "flip") {
    state.cards = shuffle(state.cards);
    state.index = 0;
    state.flipped = false;
    renderFlip();
  } else {
    state.quizCards = shuffle(state.quizCards);
    state.quizIndex = 0;
    state.quizAnswered = false;
    state.quizCorrect = 0;
    state.quizWrong = 0;
    state._currentOptions = null;
    renderQuiz();
  }
});

document.getElementById("resetBtn").addEventListener("click", () => {
  initDeck();
  render();
});

/* ============================================================
   KEYBOARD
============================================================ */
document.addEventListener("keydown", (e) => {
  // Don't trap typing in inputs
  if (e.target.tagName === "INPUT" || e.target.tagName === "SELECT" || e.target.tagName === "TEXTAREA") return;

  if (state.mode === "flip") {
    if (e.key === " " || e.key === "Spacebar") {
      e.preventDefault();
      state.flipped = !state.flipped;
      const card = document.getElementById("card");
      if (card) card.classList.toggle("flipped", state.flipped);
    } else if (e.key === "ArrowRight") {
      e.preventDefault();
      next();
    } else if (e.key === "ArrowLeft") {
      e.preventDefault();
      prev();
    }
  } else if (state.mode === "quiz") {
    if (["1","2","3","4"].includes(e.key) && !state.quizAnswered) {
      const idx = parseInt(e.key, 10) - 1;
      const opts = document.querySelectorAll(".option");
      if (opts[idx]) opts[idx].click();
    } else if (e.key === "Enter" && state.quizAnswered) {
      const btn = document.getElementById("quizNext");
      if (btn) btn.click();
    }
  }
});

/* ============================================================
   BOOT
============================================================ */
loadState();
buildLectureDropdown();
bindTabs();
initDeck();
render();
</script>
